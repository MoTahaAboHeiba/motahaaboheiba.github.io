  <style>
    :root {
      --bg-primary: #0a0f1e;
      --bg-secondary: #0f1628;
      --bg-card: #131929;
      --bg-alt: #0d1220;
      --accent: #4f8dff;
      --accent-2: #64ffda;
      --accent-3: #ff6b6b;
      --text-primary: #e8eaf6;
      --text-secondary: #8892b0;
      --text-muted: #4a5568;
      --border: rgba(79, 141, 255, 0.15);
      --border-bright: rgba(79, 141, 255, 0.35);
      --glow: 0 0 30px rgba(79, 141, 255, 0.2);
      --font-display: 'Syne', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --nav-h: 70px;
      --section-gap: 120px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: var(--nav-h); }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; }
    ul { list-style: none; }

    /* NOISE — reduced so it doesn't bleed into cards */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.1;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    ::selection { background: rgba(79, 141, 255, 0.3); color: #fff; }

    /* NAV */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      padding: 0 clamp(20px, 5vw, 60px);
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow var(--transition);
    }
    #navbar.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.4); }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--accent-2); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .nav-links a {
      position: relative;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 2px; left: 14px; right: 14px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      transform: scaleX(0);
      transition: transform var(--transition);
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--text-primary);
      background: rgba(79, 141, 255, 0.08);
    }
    .nav-links a.active::after { transform: scaleX(1); }
    .nav-cv {
      margin-left: 12px;
      padding: 8px 18px !important;
      background: var(--accent) !important;
      color: #fff !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
      transition: transform var(--transition), box-shadow var(--transition) !important;
    }
    .nav-cv:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,141,255,0.4) !important;
    }
    .nav-cv::after { display: none !important; }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      margin-left: auto;
      padding: 4px;
    }
    .nav-hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--text-primary);
      border-radius: 2px;
      transition: var(--transition);
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-mobile {
      display: none;
      flex-direction: column;
      gap: 2px;
      position: fixed;
      top: var(--nav-h); left: 0; right: 0;
      background: rgba(10,15,30,0.97);
      backdrop-filter: blur(20px);
      padding: 20px;
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }
    .nav-mobile.open { display: flex; }
    .nav-mobile a {
      padding: 12px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 8px;
      transition: var(--transition);
    }
    .nav-mobile a:hover, .nav-mobile a.active {
      background: rgba(79,141,255,0.1);
      color: var(--text-primary);
    }

    /* LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 clamp(20px, 5vw, 60px);
    }
    section { padding: var(--section-gap) 0; }

    /* SECTION LABELS — body font, not mono */
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 30px; height: 1px;
      background: var(--accent);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 60px;
    }
    .section-title em {
      font-style: normal;
      color: var(--accent);
    }

    /* SCROLL REVEAL */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal-left.visible { opacity: 1; transform: translateX(0); }
    .reveal-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }
    .stagger > * {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .stagger.visible > * { opacity: 1; transform: translateY(0); }
    .stagger.visible > *:nth-child(1) { transition-delay: 0.05s; }
    .stagger.visible > *:nth-child(2) { transition-delay: 0.12s; }
    .stagger.visible > *:nth-child(3) { transition-delay: 0.19s; }
    .stagger.visible > *:nth-child(4) { transition-delay: 0.26s; }
    .stagger.visible > *:nth-child(5) { transition-delay: 0.33s; }
    .stagger.visible > *:nth-child(6) { transition-delay: 0.40s; }
    .stagger.visible > *:nth-child(7) { transition-delay: 0.47s; }
    .stagger.visible > *:nth-child(8) { transition-delay: 0.54s; }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
      padding-top: var(--nav-h);
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,141,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,141,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
    }
    #hero::after {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,141,255,0.08) 0%, transparent 70%);
      top: -200px; right: -100px;
      pointer-events: none;
    }
    .hero-glow-2 {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,255,218,0.05) 0%, transparent 70%);
      bottom: -100px; left: -50px;
      pointer-events: none;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
      width: 100%;
    }

    /* BADGE — blue now */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(79, 141, 255, 0.08);
      border: 1px solid rgba(79, 141, 255, 0.25);
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      animation: fadeInDown 0.8s ease both;
    }
    .hero-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* NAME — gradient fill on last name instead of outline */
    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
      animation: fadeInUp 0.8s 0.1s ease both;
    }
    .hero-name em {
      font-style: normal;
      display: block;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-role {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--accent);
      margin: 20px 0 24px;
      animation: fadeInUp 0.8s 0.2s ease both;
    }
    .hero-role::before { content: '//'; color: var(--text-muted); }

    .hero-bio {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.8;
      max-width: 520px;
      animation: fadeInUp 0.8s 0.3s ease both;
    }

    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 36px;
      animation: fadeInUp 0.8s 0.4s ease both;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      cursor: pointer;
      border: none;
      font-family: var(--font-body);
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(79,141,255,0.4); }
    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1.5px solid var(--border-bright);
    }
    .btn-outline:hover {
      background: rgba(79,141,255,0.08);
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      padding: 10px 18px;
    }
    .btn-ghost:hover { color: var(--text-primary); border-color: var(--border-bright); }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      animation: fadeInUp 0.8s 0.5s ease both;
    }
    .hero-stat { text-align: center; }
    .hero-stat-num {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

      font-size: 0.72rem;
      text-
